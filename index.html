<!DOCTYPE html>
<html>
<head>
  <title>Surfs Up Trading Book</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      overflow: hidden;
    }

    .book {
      display: flex;
      width: 500%;
      height: 100vh;
      transition: transform 0.5s ease;
    }

    .page {
      width: 100%;
      flex-shrink: 0;
      padding: 40px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin: 15px 0;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #1e293b;
    }

    .nav button {
      flex: 1;
      padding: 15px;
      border: none;
      background: none;
      color: white;
    }
  </style>
</head>

<body>

<div class="book" id="book">

  <div class="page">
    <h1>🌊 Surfs Up Thesis</h1>
    <div class="card">Market movement is like waves.</div>
    <div class="card">Trends build, peak, and break.</div>
  </div>

  <div class="page">
    <h1>📊 Metrics</h1>
    <div class="card">Moving Averages</div>
    <div class="card">Volume</div>
    <div class="card">Momentum</div>
  </div>

  <div class="page">
    <h1>📈 Setups</h1>
    <div class="card">Breakouts</div>
    <div class="card">Pullbacks</div>
  </div>

  <div class="page">
    <h1>📉 Charts</h1>
    <div class="card">Charts go here next</div>
  </div>

  <div class="page">
    <h1>📝 Notes</h1>
    <div class="card">Your notes here</div>
  </div>

</div>

<div class="nav">
  <button onclick="goTo(0)">Thesis</button>
  <button onclick="goTo(1)">Metrics</button>
  <button onclick="goTo(2)">Setups</button>
  <button onclick="goTo(3)">Charts</button>
  <button onclick="goTo(4)">Notes</button>
</div>

<script>
let current = 0;

function goTo(page) {
  current = page;
  document.getElementById("book").style.transform =
    "translateX(-" + (page * 100) + "%)";
}

let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50 && current < 4) goTo(current + 1);
  if (endX - startX > 50 && current > 0) goTo(current - 1);
});
</script>

</body>
</html>
